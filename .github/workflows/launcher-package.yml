name: Package launcher (Windows)

# Manual/release-time only (FR-20 packaging, section 14.1) — a full Tauri release build +
# installer bundle takes several minutes and isn't needed on every push, unlike the fast
# compile-check in ci.yml's `launcher-build` job that already runs on every PR.
on:
  workflow_dispatch: {}

jobs:
  package-windows:
    name: Build Windows installer
    runs-on: windows-latest
    defaults:
      run:
        working-directory: launcher
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: launcher -> target
      - run: cargo install tauri-cli --version "^2.0.0" --locked
      - run: cargo tauri build --manifest-path src-tauri/Cargo.toml
      - uses: actions/upload-artifact@v4
        with:
          name: pcb-inspect-launcher-windows
          path: |
            launcher/src-tauri/target/release/bundle/nsis/*.exe
            launcher/src-tauri/target/release/bundle/msi/*.msi
          retention-days: 14
